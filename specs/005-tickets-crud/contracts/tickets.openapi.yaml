openapi: 3.1.0
info:
  title: IssueFlow — Tickets API
  version: 1.0.0
  description: >
    CRUD and lifecycle management for Tickets.
    All endpoints require a valid Bearer JWT (set via the collection-level variable).
    Status codes follow the README Tickets APIs table (all success responses are 200 OK).

servers:
  - url: http://localhost:8080

security:
  - bearerAuth: []

tags:
  - name: Tickets

paths:
  /tickets:
    get:
      summary: Get tickets by project
      operationId: listTicketsByProject
      tags: [Tickets]
      parameters:
        - name: projectId
          in: query
          required: true
          schema:
            type: integer
            format: int64
          description: ID of the project whose active tickets to retrieve
      responses:
        "200":
          description: List of active tickets for the project
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TicketResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    post:
      summary: Create a ticket
      operationId: createTicket
      tags: [Tickets]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTicketRequest"
      responses:
        "200":
          description: Ticket created (README template — 200 OK, not 201)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationFailed"

  /tickets/{ticketId}:
    get:
      summary: Get ticket by ID
      operationId: getTicketById
      tags: [Tickets]
      parameters:
        - $ref: "#/components/parameters/TicketId"
      responses:
        "200":
          description: Ticket found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      summary: Update a ticket (fields and/or status transition)
      operationId: updateTicket
      tags: [Tickets]
      parameters:
        - $ref: "#/components/parameters/TicketId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTicketRequest"
      responses:
        "200":
          description: Ticket updated (README template — empty body)
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"

    delete:
      summary: Soft-delete a ticket
      operationId: softDeleteTicket
      tags: [Tickets]
      parameters:
        - $ref: "#/components/parameters/TicketId"
      responses:
        "200":
          description: Ticket soft-deleted (README template — empty body)
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    TicketId:
      name: ticketId
      in: path
      required: true
      schema:
        type: integer
        format: int64

  schemas:
    TicketStatus:
      type: string
      enum: [TODO, IN_PROGRESS, IN_REVIEW, DONE]

    TicketPriority:
      type: string
      enum: [LOW, MEDIUM, HIGH, CRITICAL]

    TicketType:
      type: string
      enum: [BUG, FEATURE, TECHNICAL]

    CreateTicketRequest:
      type: object
      required: [title, priority, type, projectId]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          nullable: true
        priority:
          $ref: "#/components/schemas/TicketPriority"
        type:
          $ref: "#/components/schemas/TicketType"
        projectId:
          type: integer
          format: int64
        assigneeId:
          type: integer
          format: int64
          nullable: true
        dueDate:
          type: string
          format: date-time
          nullable: true

    UpdateTicketRequest:
      type: object
      description: >
        At least one field must be present. When `status` is included, the service enforces
        forward-only transitions (TODO→IN_PROGRESS→IN_REVIEW→DONE). DONE tickets reject all
        updates with 409 Conflict.
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          nullable: true
        priority:
          $ref: "#/components/schemas/TicketPriority"
        type:
          $ref: "#/components/schemas/TicketType"
        assigneeId:
          type: integer
          format: int64
          nullable: true
          description: Pass null to clear the assignee.
        dueDate:
          type: string
          format: date-time
          nullable: true
        status:
          $ref: "#/components/schemas/TicketStatus"

    TicketResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/TicketStatus"
        priority:
          $ref: "#/components/schemas/TicketPriority"
        type:
          $ref: "#/components/schemas/TicketType"
        projectId:
          type: integer
          format: int64
        assigneeId:
          type: integer
          format: int64
          nullable: true
        dueDate:
          type: string
          format: date-time
          nullable: true
        isOverdue:
          type: boolean
          description: Computed — true if dueDate is non-null and in the past.

    ProblemDetail:
      type: object
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string

  responses:
    BadRequest:
      description: Request body could not be parsed (400)
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
    Unauthorized:
      description: Missing or invalid bearer token (401)
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
    NotFound:
      description: Ticket or referenced resource not found (404)
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
    Conflict:
      description: >
        Conflict with current state (409). Possible causes:
        - DONE ticket cannot be updated or transitioned
        - Backward or skip-step status transition
        - Concurrent modification detected (optimistic lock failure)
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
    ValidationFailed:
      description: Semantic validation failure (422)
      content:
        application/problem+json:
          schema:
            allOf:
              - $ref: "#/components/schemas/ProblemDetail"
              - type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        field:
                          type: string
                        message:
                          type: string
