server:
  port: 0

spring:
  application:
    name: issueflow
  datasource:
    url: jdbc:h2:mem:issueflow;MODE=PostgreSQL;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    open-in-view: false
  flyway:
    enabled: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  security:
    jwt:
      secret: test-secret-key-for-unit-tests-only-32chars

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-components: always
      show-details: always
